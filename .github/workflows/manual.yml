name: Manual QA suite
on:
  # checkov:skip=CKV_GHA_7:Choice inputs are the purpose of this isolated, no-secret manual QA workflow.
  workflow_dispatch:
    inputs:
      ref: { description: Branch or commit SHA, required: true, default: main, type: string }
      seed:
        {
          description: Seed,
          required: true,
          default: default,
          type: choice,
          options:
            [
              default,
              empty-state,
              candidate-creation,
              candidate-duplicate,
              permission-denied,
              interview-complete,
              performance-data,
              accessibility-review,
            ],
        }
      suite:
        {
          description: Suite,
          required: true,
          default: smoke,
          type: choice,
          options: [smoke, full, a11y, visual, security, performance],
        }
      browser:
        {
          description: Browser,
          required: true,
          default: chromium-desktop,
          type: choice,
          options: [chromium-desktop, firefox-desktop, webkit-desktop, mobile-chrome],
        }
      jira_issue: { description: Optional Jira issue key, required: false, type: string }
permissions:
  contents: read
jobs:
  selected:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      QA_SEED: ${{ inputs.seed }}
      JIRA_ISSUE_KEY: ${{ inputs.jira_issue }}
      JIRA_ENABLED: 'false'
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { ref: '${{ inputs.ref }}' }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm qa:start && pnpm qa:reset --seed "${{ inputs.seed }}"
      - name: Run selected suite
        run: |
          case "${{ inputs.suite }}" in
            smoke) pnpm test:e2e:smoke ;;
            full) pnpm exec playwright test --project="${{ inputs.browser }}" ;;
            a11y) pnpm test:a11y ;;
            visual) pnpm test:visual ;;
            security) pnpm test:security ;;
            performance) pnpm test:performance ;;
          esac
      - if: always()
        run: pnpm jira:dry-run && pnpm qa:report
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          {
            name: manual-quality-evidence,
            path: "reports/**\nplaywright-report/**\ntest-results/**",
            if-no-files-found: warn,
            retention-days: 14,
          }
      - if: always()
        run: pnpm qa:down
