name: Main expanded quality
on:
  push:
    branches: [main]
permissions:
  contents: read
env:
  PLAYWRIGHT_EXTERNAL_SERVER: 'true'
jobs:
  expanded:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm qa:start
      - run: pnpm qa:check
      - run: pnpm test:integration && pnpm test:e2e:full
      - run: pnpm test:visual && pnpm test:api:schemathesis && pnpm test:dast
      - if: always()
        run: pnpm qa:report
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          {
            name: main-quality-evidence,
            path: "reports/**\nplaywright-report/**\ntest-results/**",
            if-no-files-found: warn,
            retention-days: 21,
          }
      - if: always()
        run: pnpm qa:down
