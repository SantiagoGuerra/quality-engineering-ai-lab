name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 3 * * 2'

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL JavaScript and TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: github/codeql-action/init@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with:
          category: /language:javascript-typescript
