name: Nightly deep quality
on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deep:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    continue-on-error: false
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm qa:start
      - run: pnpm test:e2e:full && pnpm test:property && pnpm test:mutation
      - run: pnpm test:pa11y && pnpm test:lighthouse
      - run: pnpm test:api:schemathesis && ZAP_ACTIVE=true pnpm test:dast
      - run: PERF_SUITE=load pnpm test:performance
      - name: sitespeed.io diagnostics (non-blocking signal)
        continue-on-error: true
        run: pnpm test:sitespeed
      - run: pnpm reports:flaky
      - name: Experimental agent lane (non-blocking)
        continue-on-error: true
        run: pnpm agents:init && echo "Agent execution needs an explicitly configured model runner"
      - if: always()
        run: pnpm qa:report
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          {
            name: nightly-quality-evidence,
            path: "reports/**\nplaywright-report/**\ntest-results/**",
            if-no-files-found: warn,
            retention-days: 30,
          }
      - if: always()
        run: pnpm qa:down
