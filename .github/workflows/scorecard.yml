name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '43 3 * * 3'
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: OpenSSF supply-chain score
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false }
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: reports/generated/security/scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with: { sarif_file: reports/generated/security/scorecard.sarif }
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-sarif
          path: reports/generated/security/scorecard.sarif
          if-no-files-found: warn
          retention-days: 30
