name: PR quality gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  QA_SEED: default
  FC_SEED: '20260721'
  PLAYWRIGHT_EXTERNAL_SERVER: 'true'

jobs:
  static:
    name: Static quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build, lint, types and workflow syntax
        run: pnpm build && pnpm lint && pnpm typecheck && pnpm test:workflows
      - name: Unit, component, API and property tests
        run: pnpm test
      - name: Build component catalog
        run: pnpm storybook:build
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-${{ github.event.pull_request.number }}-static
          path: |
            reports/generated/vitest/**
            apps/ui/storybook-static/**
          if-no-files-found: warn
          retention-days: 14

  runtime:
    name: Runtime quality
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm qa:start
      - name: Smoke, accessibility, API scenarios and golden tests
        run: pnpm test:e2e:smoke && pnpm test:a11y && pnpm test:api:hurl && pnpm test:visual
      - if: always()
        run: pnpm qa:report
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-${{ github.event.pull_request.number }}-runtime
          path: |
            reports/**
            playwright-report/**
            test-results/**
          if-no-files-found: warn
          retention-days: 14
      - if: always()
        run: pnpm qa:down

  security:
    name: Security quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:security
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-${{ github.event.pull_request.number }}-security
          path: reports/generated/security/**
          if-no-files-found: warn
          retention-days: 14

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  comment:
    name: Quality summary
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    needs: [static, runtime, security, dependency-review]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with: { egress-policy: audit }
      - name: Check out trusted base revision for the publishing script
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { ref: '${{ github.event.pull_request.base.sha }}' }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Render or update the single human-readable PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STATIC_RESULT: ${{ needs.static.result }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
        run: |
          if [[ "$GITHUB_ACTOR" == "dependabot[bot]" ]]; then
            pnpm github:comment:dry-run
          else
            pnpm github:comment:publish
          fi
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-${{ github.event.pull_request.number }}-summary
          path: reports/generated/github/pr-comment.md
          if-no-files-found: warn
          retention-days: 14
