name: PR quality gate
on:
  pull_request:
permissions:
  contents: read
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  deterministic:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.34.5, run_install: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20.19.4, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build && pnpm lint && pnpm typecheck
      - run: pnpm test
      - run: pnpm qa:start
      - run: pnpm test:e2e:smoke && pnpm test:a11y && pnpm test:api:hurl
      - run: pnpm test:security
      - if: always()
        run: pnpm qa:report
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: { name: pr-quality-evidence, path: "reports/**\nplaywright-report/**\ntest-results/**", if-no-files-found: warn, retention-days: 14 }
      - if: always()
        run: pnpm qa:down
